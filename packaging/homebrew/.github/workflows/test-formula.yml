name: Test TurtleTerm Homebrew Formula

on:
  pull_request:
    paths:
      - 'Formula/**'
      - '.github/workflows/test-formula.yml'
  push:
    branches:
      - main
    paths:
      - 'Formula/**'
      - '.github/workflows/test-formula.yml'
  workflow_dispatch:

jobs:
  test-formula:
    name: Test TurtleTerm formula on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-24.04

    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Homebrew on Linux
        if: runner.os == 'Linux'
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit formula
        run: brew audit --formula --strict Formula/turtle-term.rb || true

      - name: Install formula from HEAD
        run: brew install --HEAD Formula/turtle-term.rb

      - name: Test formula
        run: brew test turtle-term
